<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="600" fill="#0f0f1a"/>
  
  <!-- 浏览器框架 -->
  <rect width="800" height="30" fill="#1a1a2e"/>
  <circle cx="20" cy="15" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="15" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="15" r="6" fill="#27c93f"/>
  
  <!-- 地址栏 -->
  <rect x="100" y="5" width="600" height="20" rx="4" fill="#2a2a3e"/>
  <text x="110" y="19" font-family="Arial" font-size="11" fill="#666">http://localhost:5000</text>
  
  <!-- 网页内容 -->
  <rect x="50" y="60" width="700" height="500" fill="#1a1a2e" rx="8"/>
  
  <!-- 标题 -->
  <text x="400" y="120" font-family="Arial" font-size="24" fill="#00d9ff" text-anchor="middle">🦞 茶海虾王 Web 界面</text>
  
  <!-- 对话区域 -->
  <rect x="80" y="160" width="640" height="280" fill="#16213e" rx="8"/>
  
  <text x="100" y="210" font-family="Arial" font-size="16" fill="#00ff88">你：你好</text>
  <text x="100" y="250" font-family="Arial" font-size="16" fill="#b0b0b0">AI: 你好！我是茶海虾王 AI 助手，有什么可以帮助你的吗？</text>
  
  <text x="100" y="300" font-family="Arial" font-size="16" fill="#00ff88">你：今天天气怎么样？</text>
  <text x="100" y="340" font-family="Arial" font-size="16" fill="#b0b0b0">AI: 我正在查询天气信息...</text>
  
  <!-- 输入框 -->
  <rect x="80" y="470" width="540" height="50" fill="#2a2a3e" rx="8"/>
  <text x="100" y="500" font-family="Arial" font-size="14" fill="#666">输入消息...</text>
  
  <!-- 发送按钮 -->
  <rect x="630" y="470" width="90" height="50" fill="#00d9ff" rx="8"/>
  <text x="675" y="500" font-family="Arial" font-size="14" fill="#0f0f1a" text-anchor="middle" font-weight="bold">发送</text>
  
  <!-- 底部提示 -->
  <text x="400" y="580" font-family="Arial" font-size="14" fill="#666" text-anchor="middle">网页界面截图占位图</text>
  <text x="400" y="595" font-family="Arial" font-size="12" fill="#444" text-anchor="middle">请替换为实际运行截图</text>
</svg>
