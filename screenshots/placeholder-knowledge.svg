<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="600" fill="#0f0f1a"/>
  
  <!-- 浏览器框架 -->
  <rect width="800" height="30" fill="#1a1a2e"/>
  <circle cx="20" cy="15" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="15" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="15" r="6" fill="#27c93f"/>
  
  <!-- 地址栏 -->
  <rect x="100" y="5" width="600" height="20" rx="4" fill="#2a2a3e"/>
  <text x="110" y="19" font-family="Arial" font-size="11" fill="#666">http://localhost:5000/knowledge</text>
  
  <!-- 网页内容 -->
  <rect x="50" y="60" width="700" height="500" fill="#1a1a2e" rx="8"/>
  
  <!-- 标题 -->
  <text x="400" y="100" font-family="Arial" font-size="22" fill="#00d9ff" text-anchor="middle">🧠 知识库管理</text>
  
  <!-- 内容区域 -->
  <rect x="80" y="130" width="640" height="380" fill="#16213e" rx="8"/>
  
  <!-- 添加知识按钮 -->
  <rect x="550" y="150" width="150" height="35" fill="#00d9ff" rx="6"/>
  <text x="625" y="172" font-family="Arial" font-size="13" fill="#0f0f1a" text-anchor="middle" font-weight="bold">+ 添加知识</text>
  
  <!-- 知识列表标题 -->
  <text x="100" y="210" font-family="Arial" font-size="16" fill="#ffffff" font-weight="bold">已存储的知识</text>
  
  <!-- 知识条目 1 -->
  <rect x="100" y="230" width="600" height="50" fill="#2a2a3e" rx="6"/>
  <text x="120" y="250" font-family="Arial" font-size="13" fill="#00ff88">user_name</text>
  <text x="250" y="250" font-family="Arial" font-size="13" fill="#b0b0b0">= 小明</text>
  <text x="550" y="250" font-family="Arial" font-size="11" fill="#666">2026-04-08 02:00</text>
  <text x="650" y="250" font-family="Arial" font-size="11" fill="#ff5f56" text-anchor="middle">删除</text>
  
  <!-- 知识条目 2 -->
  <rect x="100" y="290" width="600" height="50" fill="#2a2a3e" rx="6"/>
  <text x="120" y="310" font-family="Arial" font-size="13" fill="#00ff88">user_preference</text>
  <text x="280" y="310" font-family="Arial" font-size="13" fill="#b0b0b0">= 喜欢蓝色</text>
  <text x="550" y="310" font-family="Arial" font-size="11" fill="#666">2026-04-08 02:05</text>
  <text x="650" y="310" font-family="Arial" font-size="11" fill="#ff5f56" text-anchor="middle">删除</text>
  
  <!-- 知识条目 3 -->
  <rect x="100" y="350" width="600" height="50" fill="#2a2a3e" rx="6"/>
  <text x="120" y="370" font-family="Arial" font-size="13" fill="#00ff88">user_age</text>
  <text x="230" y="370" font-family="Arial" font-size="13" fill="#b0b0b0">= 25</text>
  <text x="550" y="370" font-family="Arial" font-size="11" fill="#666">2026-04-08 03:10</text>
  <text x="650" y="370" font-family="Arial" font-size="11" fill="#ff5f56" text-anchor="middle">删除</text>
  
  <!-- 知识条目 4 -->
  <rect x="100" y="410" width="600" height="50" fill="#2a2a3e" rx="6"/>
  <text x="120" y="430" font-family="Arial" font-size="13" fill="#00ff88">favorite_language</text>
  <text x="300" y="430" font-family="Arial" font-size="13" fill="#b0b0b0">= Python</text>
  <text x="550" y="430" font-family="Arial" font-size="11" fill="#666">2026-04-08 03:15</text>
  <text x="650" y="430" font-family="Arial" font-size="11" fill="#ff5f56" text-anchor="middle">删除</text>
  
  <!-- 统计信息 -->
  <text x="100" y="490" font-family="Arial" font-size="13" fill="#666">共 4 条知识 | 最后更新：2026-04-08 03:15</text>
  
  <!-- 底部提示 -->
  <text x="400" y="580" font-family="Arial" font-size="14" fill="#666" text-anchor="middle">知识库管理界面截图占位图</text>
  <text x="400" y="595" font-family="Arial" font-size="12" fill="#444" text-anchor="middle">请替换为实际运行截图</text>
</svg>
